spring:
  application:
    name: devflow-api
  datasource:
    url: jdbc:mysql://localhost:3306/devflow?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: devflow
    password: devflow
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: localhost
    port: 5672
    username: devflow
    password: devflow
    virtual-host: /
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

server:
  port: 8080

devflow:
  security:
    jwt:
      issuer: devflow-api
      secret: devflow-phase1-super-secret-key-please-change-in-prod-2026
      access-token-minutes: 15
      refresh-token-days: 30
  bootstrap:
    admin:
      enabled: true
      username: admin
      password: Admin@123456
      display-name: DevFlow Admin
  cache:
    redis:
      enabled: true
