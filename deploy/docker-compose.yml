name: devflow-local

services:
  mysql:
    image: mysql:8.4
    container_name: devflow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devflow
      MYSQL_USER: devflow
      MYSQL_PASSWORD: devflow
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -udevflow -pdevflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devflow_net

  redis:
    image: redis:7.2
    container_name: devflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devflow_net

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: devflow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: devflow
      RABBITMQ_DEFAULT_PASS: devflow
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - devflow_net

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: devflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: devflow
      MINIO_ROOT_PASSWORD: devflow123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - devflow_net

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: devflow-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/devflow?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: devflow
      SPRING_DATASOURCE_PASSWORD: devflow
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: devflow
      SPRING_RABBITMQ_PASSWORD: devflow
    ports:
      - "8080:8080"
    networks:
      - devflow_net

networks:
  devflow_net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  minio_data:
